  <div class="container">
    <h2>30-Day Streak 🔥</h2>
    <div id="tracker"></div>
  </div>
  <script>
    const habits = {
      "Drink Water": Array(30).fill(false),
      "Read 10 Pages": Array(30).fill(false),
      "Code Daily": Array(30).fill(false).map(()=> Math.random() > 0.5) // Demo data
    };
    const tracker = document.getElementById('tracker');

    function render() {
      tracker.innerHTML = '';
      for (const [name, days] of Object.entries(habits)) {
        const row = document.createElement('div');
        row.className = 'habit-row';
        row.innerHTML = `<div class="habit-name">${name}</div>`;
        const grid = document.createElement('div');
        grid.className = 'grid';
        
        days.forEach((done, i) => {
          const cell = document.createElement('div');
          cell.className = `cell ${done ? 'done' : ''}`;
          cell.onclick = () => { habits[name][i] = !habits[name][i]; render(); };
          grid.appendChild(cell);
        });
        row.appendChild(grid);
        tracker.appendChild(row);
      }
    }
    render();
  </script>
